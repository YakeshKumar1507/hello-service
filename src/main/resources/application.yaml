spring:
  application:
    name: hello-service

  config:
    import: configserver:${CONFIG_SERVER_URL:http://localhost:8888}

management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always

  health:
    circuitbreakers:
      enabled: true

greet:
  service:
    url: ${GREET_SERVICE_URL:http://localhost:8082}